services:
  # ── Backend (Express API) ────────────────────────────────────────────────────
  - type: web
    name: ai-flow-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: OPENROUTER_API_KEY
        sync: false          # set manually in Render dashboard
      - key: MONGODB_URI
        sync: false          # set manually in Render dashboard
      - key: SITE_URL
        sync: false          # your deployed frontend URL

  # ── Frontend (React) ─────────────────────────────────────────────────────────
  - type: web
    name: ai-flow-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./build
    envVars:
      - key: REACT_APP_API_URL
        sync: false          # your deployed backend URL, e.g. https://ai-flow-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
